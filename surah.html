<!DOCTYPE html>
<html lang="id" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="search.css">
    <link rel="stylesheet" href="arabic.css">
<style>
.toggle-icon {
    font-size: 18px;
    transition: all 0.3s ease;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden;
}

/* ============================================
   2. CSS VARIABLES (THEMING)
   ============================================ */
/* Light Mode (default) */
:root {
    --bg-color: #f0f4f8;
    --text-color: #2d3748;
    --header-bg: #319795;
    --header-text: white;
    --menu-bg: white;
    --menu-text: #2d3748;
    --menu-hover-border: #319795;
    --menu-shadow: rgba(0,0,0,0.05);
    --menu-hover-shadow: rgba(0,0,0,0.1);
    --icon-bg: #e6fffa;
    --icon-color: #319795;
    --footer-text: #a0aec0;
    --toggle-bg: #e2e8f0;
    --toggle-circle: white;
}

/* Dark Mode */
[data-theme="dark"] {
    --bg-color: #1a202c;
    --text-color: #e2e8f0;
    --header-bg: #2c7a7b;
    --header-text: white;
    --menu-bg: #2d3748;
    --menu-text: #e2e8f0;
    --menu-hover-border: #4fd1c5;
    --menu-shadow: rgba(0,0,0,0.3);
    --menu-hover-shadow: rgba(0,0,0,0.5);
    --icon-bg: #2c7a7b;
    --icon-color: #4fd1c5;
    --footer-text: #718096;
    --toggle-bg: #4fd1c5;
    --toggle-circle: #1a202c;
}

/* ============================================
   3. BODY STYLES
   ============================================ */
body {
    font-family: 'Amiri', serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    padding: 20px;
    line-height: 1.8;
    direction: rtl;
}

/* ============================================
   4. HEADER FIXED (FREEZE)
   ============================================ */
.top-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 9999;
    width: 100%;
    height: 45px;
    background: var(--header-bg);
    border-bottom-left-radius: 15px;
    border-bottom-right-radius: 15px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    box-shadow: 0 4px 12px rgba(0,0,0,.12);
    direction: ltr;
}

/* ============================================
   5. TOP BAR (SEARCH + BUTTONS)
   ============================================ */
.top-bar {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding-left: 40px;
}

/* Back Button (jika ada di HTML nanti) */
.back-container {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.back-button {
    width: 14px;
    height: 14px;
    border-left: 4px solid #fff;
    border-bottom: 4px solid #fff;
    transform: rotate(45deg);
    border-radius: 2px;
}

/* ============================================
   6. SEARCH BOX
   ============================================ */
.search-box {
    flex: 1;
    max-width: none;
    position: relative;
}

.search-box input {
    width: 100%;
    height: 30px;
    border: none;
    outline: none;
    border-radius: 999px;
    padding: 0 40px 0 15px;
    font-size: 14px;
    background: #fff;
    font-family: 'Inter', sans-serif;
}

.search-icon {
    position: absolute;
    right: 15px;
    top: 55%;
    transform: translateY(-50%);
    color: #319795;
    font-size: 16px;
    pointer-events: none;
}

/* ============================================
   7. BUTTONS (THEME TOGGLE & CONTROL)
   ============================================ */
.theme-toggle,
.control-btn {
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    border: none;
    border-radius: 50%;
    background: #ffffff;
    color: #319795;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: .3s;
    font-size: 18px;
}

.theme-toggle:hover,
.control-btn:hover {
    transform: scale(1.05);
}

.toggle-icon {
    font-size: 18px;
}

/* ============================================
   8. CONTAINER UTAMA
   ============================================ */
.container {
    max-width: 850px;
    margin: 50px auto 20px;
    background: #ffffff;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

/* ============================================
   9. HEADER HALAMAN (JUDUL)
   ============================================ */
header {
    margin-top: -5px;
    text-align: center;
    margin-bottom: 15px;
    border-bottom: 3px double #319795;
    padding-bottom: 5px;
}

h1 {
    color: #319795;
    font-size: 2.5rem;
    margin: 0;
    direction: ltr;
}

.subtitle {
    font-size: 1.2rem;
    color: #4a5568;
    direction: ltr;
}

/* ============================================
   10. DZIKIR CARD
   ============================================ */
.dzikir-card {
    background: #fff;
    border: 2px solid #e2e8f0;
    border-right: 6px solid #319795;
    margin-bottom: 25px;
    padding: 25px;
    border-radius: 12px;
    position: relative;
}

.doa-title{
    display: block;
    text-align: center;
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #2c3e50;
    margin: -10px 0 5px;
    line-height: 1.4;
}

/* ============================================
   11. TRANSLATION (DETAILS/SUMMARY)
   ============================================ */
details {
    direction: ltr;
    margin-top: 10px;
    font-family: 'Inter', sans-serif;
}

summary {
    cursor: pointer;
    color: #319795;
    font-weight: 600;
    font-size: 0.8rem;
    outline: none;
    user-select: none;
    margin-bottom: 8px;
}

summary:hover {
    color: #2c7a7b;
    text-decoration: underline;
}

.translation {
    display: block;
    padding: 10px 15px;
    background: #f7fafc;
    border-radius: 8px;
    font-size: 0.95rem;
    color: #4a5568;
    line-height: 1.6;
    font-style: italic;
}

/* ============================================
   12. INFO ROW (INSTRUKSI & REFERENCE)
   ============================================ */
.info-row {
    text-align: center;
    margin-top: 5px;
    margin-bottom: 15px;
    padding-bottom: 5px;
    border-bottom: 2px dashed #e2e8f0;
}

.instruction {
    color: #c53030;
    font-weight: bold;
    font-size: 0.8rem;
}

.ref-number {
    background: #319795;
    color: white;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 0.8rem;
    font-family: sans-serif;
}

/* ============================================
   13. FOOTER
   ============================================ */
footer {
    text-align: center;
    margin-top: 10px;
    padding-top: 20px;
    color: #718096;
    font-size: 0.9rem;
    border-top: 1px solid #e2e8f0;
    direction: ltr;
}

/* ============================================
   14. FONT SLIDER (POPUP)
   ============================================ */
.font-slider-box {
    position: absolute;
    top: 65px;
    right: 60px;

    background: #fff;
    padding: 10px 12px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,.15);

    display: none;
    align-items: center;
    gap: 10px;

    z-index: 9999;
}

.font-slider-box input[type="range"] {
    width: 120px;
    accent-color: #319795;
}

.font-slider-box span {
    font-size: 12px;
    min-width: 30px;
    text-align: center;
}

/* ============================================
   15. DARK MODE OVERRIDES
   ============================================ */
[data-theme="dark"] body {
    background: #2d3748;
    color: #e2e8f0;
}

[data-theme="dark"] .container {
    background: #2d3748;
}

[data-theme="dark"] .dzikir-card {
    background: #1f2937;
    border-color: #2c7a7b;
}

[data-theme="dark"] .arabic {
    color: #fff;
}

[data-theme="dark"] .translation {
    background: #374151;
    color: #e2e8f0;
}

[data-theme="dark"] summary {
    color: #4fd1c5;
}

[data-theme="dark"] .top-header {
    background: #2c7a7b;
}

[data-theme="dark"] .search-box input {
    background: #1f2937;
    color: #fff;
}

[data-theme="dark"] .search-box input::placeholder {
    color: rgba(255,255,255,.7);
}

[data-theme="dark"] .theme-toggle,
[data-theme="dark"] .control-btn {
    background: #1f2937;
    color: #4fd1c5;
}

[data-theme="dark"] .font-slider-box {
    background: #2d3748;
    color: #fff;
}

[data-theme="dark"] h1,
[data-theme="dark"] p {
    color: #4fd1c5;
}

[data-theme="dark"] .doa-title {
    color: #4fd1c5;
}
/* ============================================
   16. RESPONSIVE MOBILE (HP)
   ============================================ */
@media (max-width: 600px) {
    body {
        padding: 0;
        background-color: #ffffff;
    }

    .container {
        padding: 15px 10px;
        border-radius: 0;
        box-shadow: none;
    }

    .dzikir-card {
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
    }

    .arabic {
        font-size: 1.4rem;
        line-height: 2;
    }

        h1 {
        font-size: 1.5rem;
    }

    .subtitle {
        font-size: 0.9rem;
    }
}
</style>
<title>Surah</title>
<script src="app.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-header">
    <div class="back-container" onclick="goBack()">
        <div class="back-button"></div>
    </div>

    <div class="top-bar">
        <div class="search-box">
            <input type="text" placeholder="Cari doa atau dzikir">
            <span class="search-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
        </div>

        <button id="themeToggle" class="theme-toggle" title="Dark Mode">
            <i class="fa-solid fa-sun toggle-icon"></i>
        </button>

        <div id="fontSliderBox" class="font-slider-box">
            <input type="range" id="fontSlider" min="1.2" max="3.2" step="0.1" value="1.8">
            <span id="fontValue">1.8</span>
        </div>

        <button id="fontSizeBtn" class="control-btn" title="Ukuran Teks">
            <i class="fa-solid fa-maximize"></i>
        </button>

        <button id="boldBtn" class="control-btn" title="Bold Arab">
            <b style="font-size: 20px;">B</b>
        </button>
    </div>
</div>

<div class="container">
<header>
    <h1 id="surah-title">
        Memuat...
    </h1>
<p class="subtitle">Al-Qur'an Juz ke-30</p>
</header>
<span class="arabic" style="text-align: center; margin-top: 20px; margin-bottom: 20px;">بِــــــــسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</span>
		
    <div id="dzikir-content">

    </div>
    <footer>
        &copy; 2026 Kumpulan Dzikir - Sumber: Bekal Islam
    </footer>
</div>
<script>
function goBack() {
    if (window.history.length > 1) {
        window.history.back();
    } else {
        window.location.href = "/";
    }
}

let arabSize = 1.4;
let sizeState = false;
let sliderVisible = false;
let boldState = false;

const fontBtn = document.getElementById("fontSizeBtn");
const sliderBox = document.getElementById("fontSliderBox");
const slider = document.getElementById("fontSlider");
const fontValue = document.getElementById("fontValue");
const boldBtn = document.getElementById("boldBtn");
const toggleButton = document.getElementById("themeToggle");
const htmlElement = document.documentElement;

function initArabFontSize() {
    if (slider) {
        slider.value = arabSize;
        document.querySelectorAll(".arabic").forEach(el => {
            el.style.fontSize = arabSize + "rem";
        });
        if (fontValue) fontValue.textContent = arabSize;
    }
}

if (fontBtn && sliderBox) {
    fontBtn.addEventListener("click", () => {
        sliderVisible = !sliderVisible;
        sliderBox.style.display = sliderVisible ? "flex" : "none";
    });
}

if (slider) {
    slider.addEventListener("input", () => {
        const size = slider.value;
        document.querySelectorAll(".arabic").forEach(el => {
            el.style.fontSize = size + "rem";
        });
        if (fontValue) fontValue.textContent = size;
        arabSize = parseFloat(size);
        sizeState = true;
    });
}

if (boldBtn) {
    boldBtn.addEventListener("click", () => {
        const arabics = document.querySelectorAll(".arabic");
        boldState = !boldState;
        arabics.forEach(el => {
            el.style.fontWeight = boldState ? "bold" : "normal";
        });
    });
}

const savedTheme = localStorage.getItem("theme") || "light";
htmlElement.setAttribute("data-theme", savedTheme);
updateThemeIcon(savedTheme);

if (toggleButton) {
    toggleButton.addEventListener("click", () => {
        const current = htmlElement.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        htmlElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        updateThemeIcon(next);
    });
}

function updateThemeIcon(theme) {
    const icon = document.querySelector(".toggle-icon");
    if (icon) {
        icon.className = theme === "dark"
            ? "fa-solid fa-moon toggle-icon"
            : "fa-solid fa-sun toggle-icon";
    }
}

function init() {
    initArabFontSize();
}

if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
} else {
    init();
}

</script>
<script src="search.js"></script>
</body>
</html>
