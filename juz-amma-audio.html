<body>
<div class="top-header">
    <div class="back-container" onclick="goBack()">
        <div class="back-button"></div>
    </div>
    <div class="page-title">Juz Amma Audio</div>
    <div class="top-bar">
        <div class="search-box">
            <input type="text" placeholder="Cari doa atau dzikir">
            <span class="search-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
        </div>
        <button id="themeToggle" class="theme-toggle" title="Dark Mode">
            <i class="fa-solid fa-sun toggle-icon"></i>
        </button>
    </div>
</div>

<div class="global-actions">
    <button onclick="playAllSurahs()" class="global-btn play-all-btn">
        <i class="fa-solid fa-circle-play"></i> Putar Semua
    </button>
    <button onclick="downloadAllSurahs()" class="global-btn download-all-btn">
        <i class="fa-solid fa-download"></i> Download Semua
    </button>
</div>

<div class="playlist-container" id="playlist"></div>

<div id="playerView">
    <span class="close-btn" onclick="closeDisplay()"><i class="fa-solid fa-chevron-down"></i></span>
    <div class="player-content">
        <div class="surah-title-wrap">
    <h2 id="activeSurahName">Surah</h2>
</div>

<div class="ayat-panel">
    <div id="arabicText" class="arabic-panel"></div>
    <div id="translateText" class="translate-panel"></div>
</div>

<div class="control-panel">
    <div class="control-bar">
 <button id="toggleTransBtn" class="control-btn" onclick="toggleTranslation()" style="width:40px;height:40px;font-size:16px;">
       <i class="fa-solid fa-language"></i>
 </button>
        <button id="prevBtn" class="control-btn prev-btn" onclick="prevAyat()">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <button id="playPauseBtn" class="control-btn play-pause-btn" onclick="togglePlayPause()">
            <i class="fa-solid fa-play"></i>
        </button>
        <button id="nextBtn" class="control-btn next-btn" onclick="nextAyat()">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>
</div>

<div class="ayat-list">
    <div id="ayatListContainer"></div>
</div>
    </div>
    <audio id="audioPlayer"></audio>
</div>

<footer>
    &copy; 2026 Kumpulan Dzikir dan Doa - Semoga Bermanfaat
</footer>

<script>
let currentTimestampData = null;
let currentSurahData = null;
let currentSurahId = null;
let currentAyat = 1;
let totalAyatGlobal = 0;

function goBack() {
    audio.pause();
    audio.removeAttribute('src');
    audio.load();
    stopAyatSync();
    currentSurahData = null;
    currentSurahId = null;
    currentAyat = 1;
    totalAyatGlobal = 0;
    currentSurahIndex = 0;
    document.getElementById('activeSurahName').innerText = 'Surah';
    document.getElementById('arabicText').innerHTML = '';
    document.getElementById('translateText').innerHTML = '';
    document.getElementById('ayatListContainer').innerHTML = '';
    playerView.style.display = 'none';
    playlist.style.display = 'block';
}

const toggleButton = document.getElementById("themeToggle");
const htmlElement = document.documentElement;
const savedTheme = localStorage.getItem("theme") || "light";
htmlElement.setAttribute("data-theme", savedTheme);
updateThemeIcon(savedTheme);

if (toggleButton) {
    toggleButton.addEventListener("click", () => {
        const current = htmlElement.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        htmlElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        updateThemeIcon(next);
    });
}

function updateThemeIcon(theme) {
    const icon = document.querySelector(".toggle-icon");
    if (icon) {
        icon.className = theme === "dark" 
            ? "fa-solid fa-moon toggle-icon" 
            : "fa-solid fa-sun toggle-icon";
    }
}

const playlist = document.getElementById('playlist');
const playerView = document.getElementById('playerView');
const audio = document.getElementById('audioPlayer');

const menuSurah = [
    { id: 78, name: "An-Naba'" }, { id: 79, name: "An-Nazi'at" }, { id: 80, name: "'Abasa" },
    { id: 81, name: "At-Takwir" }, { id: 82, name: "Al-Infithar" }, { id: 83, name: "Al-Muthaffifiin" },
    { id: 84, name: "Al-Insyiqaq" }, { id: 85, name: "Al-Buruj" }, { id: 86, name: "At-Tariq" },
    { id: 87, name: "Al-A'la" }, { id: 88, name: "Al-Ghasyiyah" }, { id: 89, name: "Al-Fajr" },
    { id: 90, name: "Al-Balad" }, { id: 91, name: "Asy-Syams" }, { id: 92, name: "Al-Lail" },

// ===== UBAH: playAyat() untuk Play Manual =====
async function playAyat(surahId, ayatNo, totalAyat, data) {
    if (!data) {
        const res = await fetch(`data.2/${surahId}.json`);
        const json = await res.json();
        data = json[String(surahId)];
    }

    currentAyat = ayatNo;
    document.getElementById("activeSurahName").innerText = 
        `${data.name_latin} - ${totalAyat} Ayat`;

    let currentText = "";

    if (ayatNo === 1) {
        currentText = `
            <div style="margin-bottom:20px;">
                <div style="font-size:1.6rem; direction:rtl; margin-bottom:8px;">
                    ${data.preface?.taawudz || ""}
                </div>
                <div style="font-size:.8rem; margin-top:4px; direction:ltr; opacity:.8;">
                    ${data.preface?.taawudz_id || ""}
                </div>
            </div>
            <div style="margin-bottom:20px;">
                <div style="font-size:1.6rem; direction:rtl; margin-bottom:8px;">
                    ${data.preface?.basmalah || ""}
                </div>
                <div style="font-size:.8rem; margin-top:4px; direction:ltr; opacity:.8;">
                    ${data.preface?.basmalah_id || ""}
                </div>
            </div>
            <div style="font-size:1.6rem; direction:rtl;">
                ${data.text?.["1"] || ""}
            </div>
        `;
    } else {
        currentText = `
            <div style="font-size:1.6rem; direction:rtl;">
                ${data.text?.[String(ayatNo)] || ""}
            </div>
        `;
    }

    const currentTrans = getTranslation(data, ayatNo);

    document.getElementById("arabicText").innerHTML = `
    <div class="ayat-wrapper">
        <div class="ayat-current">
            ${currentText}
        </div>
    </div>
`;

    document.getElementById("translateText").innerHTML = "";

    const fileNumber = surahId - 77;
    const audioPath = `audio/${surahId}-${fileNumber}.m4a`;
    
    console.log("Surah:", surahId, "| File Number:", fileNumber, "| Path:", audioPath);
    
    audio.src = audioPath;
    updateAyatDisplay(
    surahId,
    0,
    data
);

    audio.play().then(() => {
        console.log("✅ Audio play berhasil");
        audio.addEventListener('loadedmetadata', function() {
            const totalDurasi = audio.duration;
            const durasiPerAyat = totalDurasi / totalAyat;
            startAyatSync(surahId, totalAyat, durasiPerAyat, data);
        });
    }).catch(err => {
        console.error("Gagal play audio:", err);
        alert("Audio tidak bisa diputar: " + audioPath);
    });

    audio.onended = () => {
        console.log("Audio surah selesai");
        stopAyatSync();
        if (currentAyat < totalAyat) {
            nextAyat();
        }
    };
}

}

function nextAyat() {
    if (currentSurahId && currentSurahId < 114) {

        const btn = document.getElementById("playPauseBtn");
        if (btn) {
            btn.innerHTML = '<i class="fa-solid fa-play"></i>';
        }
        stopAyatSync();
        
        const nextSurahId = currentSurahId + 1;
        startSurah(nextSurahId);
    }
}

async function downloadAll(surahId, totalAyat) {
    if (!confirm("Unduh semua ayat surah ini?")) return;
    for (let i = 1; i <= totalAyat; i++) {
        const link = document.createElement('a');
        link.href = `audio/${surahId}-${i}.m4a`;
        link.download = `${surahId}-${i}.m4a`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        await new Promise(resolve => setTimeout(resolve, 500));
    }
}

let currentSurahIndex = 0;

async function playAllSurahs() {
    currentSurahIndex = 0;
    playNextSurah();
}

async function playNextSurah() {
    if (currentSurahIndex >= menuSurah.length) {
        alert("Semua surah selesai diputar");
        return;
    }

    const surahId = menuSurah[currentSurahIndex].id;

    try {
        const res = await fetch(`data.2/${surahId}.json`);
        const json = await res.json();
        const data = json[surahId] || json;

        playerView.style.display = 'block';
        playlist.style.display = 'none';

        const totalAyat = parseInt(data.number_of_ayah);

        playAyatFullSurah(surahId, 1, totalAyat, data, () => {
            currentSurahIndex++;
            playNextSurah();
        });

    } catch(err) {
        console.error(err);
    }
}

function playAyatFullSurah(surahId, ayatNo, totalAyat, data, onFinish) {
    document.getElementById('activeSurahName').innerText = `${data.name_latin} - Ayat ${ayatNo}`;
    document.getElementById('arabicText').innerText = data.text[String(ayatNo)];
    document.getElementById('translateText').innerText = data.translations.id.text[String(ayatNo)];
    audio.src = `audio/${surahId}-${ayatNo}.m4a`;
    audio.play();

    audio.onended = () => {
        if (ayatNo < totalAyat) {
            playAyatFullSurah(surahId, ayatNo + 1, totalAyat, data, onFinish);
        } else {
            if (onFinish) onFinish();
        }
    };
}

async function downloadAllSurahs() {
    if (!confirm("Download seluruh audio Juz Amma? Jumlah file cukup banyak.")) return;
    let totalFile = 0;

    for (const surah of menuSurah) {
        try {
            const res = await fetch(`data.2/${surah.id}.json`);
            const json = await res.json();
            const data = json[surah.id] || json;
            const totalAyat = parseInt(data.number_of_ayah);

            for (let i = 1; i <= totalAyat; i++) {
                const link = document.createElement('a');
                link.href = `audio/${surah.id}-${i}.m4a`;
                link.download = `${surah.id}-${i}.m4a`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                totalFile++;
                await new Promise(resolve => setTimeout(resolve, 800));
            }
        } catch(err) {
            console.error("Gagal download surah", surah.id, err);
        }
    }
    alert(`Selesai memproses ${totalFile} file audio.`);
}

// ===== VARIABEL UNTUK AYAT SYNC =====
let ayatSyncInterval = null;
let currentDurasiPerAyat = 0;
let currentTotalAyat = 0;
let currentSurahDataSync = null;

function startAyatSync(surahId, totalAyat, durasiPerAyat, data) {

    stopAyatSync();

    ayatSyncInterval = setInterval(() => {

        const t = audio.currentTime;

        updateAyatFromTimestamp(t, data);

    }, 100);

}

function stopAyatSync() {
    if (ayatSyncInterval) {
        clearInterval(ayatSyncInterval);
        ayatSyncInterval = null;
    }
}

function updateAyatDisplay(surahId, tahap, data) {

    let arab = "";
    let indo = "";

    if (tahap === 0) {

        arab = data.preface?.taawudz || "";
        indo = data.preface?.taawudz_id || "";

    } else if (tahap === 1) {

        arab = data.preface?.basmalah || "";
        indo = data.preface?.basmalah_id || "";

    } else {

        const ayatNo = tahap - 1;

        arab = data.text?.[String(ayatNo)] || "";

        indo =
            data?.translations?.id?.text?.[String(ayatNo)] || "";
    }

    document.getElementById("arabicText").innerHTML = `
        <div class="ayat-wrapper">
            <div class="ayat-current">
                <div style="font-size:1.8rem;direction:rtl;">
                    ${arab}
                </div>
            </div>
        </div>
    `;

    document.getElementById("translateText").innerHTML = indo;
}
// Fungsi toggle
let showTranslation = true;

function toggleTranslation() {
    showTranslation = !showTranslation;
    const translatePanel = document.getElementById("translateText");
    const btn = document.getElementById("toggleTransBtn");
    
    if (translatePanel) {
        translatePanel.style.opacity = showTranslation ? "1" : "0";
        translatePanel.style.pointerEvents = showTranslation ? "auto" : "none";
    }
    
    if (btn) {
        btn.innerHTML = showTranslation 
            ? '<i class="fa-solid fa-language"></i>' 
            : '<i class="fa-solid fa-language-slash"></i>';
    }
}
function updateAyatFromTimestamp(currentTime, data) {

    if (!currentTimestampData) return;

    for (const key in currentTimestampData) {

        const item = currentTimestampData[key];

        if (
            currentTime >= item.start &&
            currentTime < item.end
        ) {

            if (currentAyat === key) return;

            currentAyat = key;

            displayTimestampSegment(
                key,
                data
            );

            break;
        }
    }
}
function displayTimestampSegment(segment, data) {

    let arab = "";
    let indo = "";

    if (segment === "taawudz") {

        arab = data.preface?.taawudz || "";
        indo = data.preface?.taawudz_id || "";

    } else if (segment === "basmalah") {

        arab = data.preface?.basmalah || "";
        indo = data.preface?.basmalah_id || "";

    } else {

        arab =
            data.text?.[segment] || "";

        indo =
            data.translations?.id?.text?.[segment] || "";
    }

    document.getElementById("arabicText").innerHTML = `
        <div class="ayat-wrapper">
            <div class="ayat-current">
                <div style="
                    font-size:1.8rem;
                    direction:rtl;
                    text-align:center;
                ">
                    ${arab}
                </div>
            </div>
        </div>
    `;

    document.getElementById("translateText").innerHTML = indo;
}
